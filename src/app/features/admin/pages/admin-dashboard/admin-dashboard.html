<div class="admin-container">
  <div class="max-width-container">
    
    <!-- Header Section -->
    <header class="admin-header">
      <div class="header-title-section">
        <nav class="breadcrumb">
          <span>Administración</span>
          <mat-icon>chevron_right</mat-icon>
          <span class="active">Administración</span>
        </nav>
        <h1 class="main-title">
          Control de <span class="text-gradient">Configuración</span>
        </h1>
        <p class="subtitle">Gestiona perfiles, módulos y opciones globales del sistema</p>
      </div>

      <div style="display: flex; gap: 12px; align-items: center;">
        <button mat-flat-button class="btn-outline" routerLink="/tickets">
          <mat-icon style="margin-right: 8px;">arrow_back</mat-icon>
          Regresar a Tickets
        </button>
      </div>
    </header>

    <!-- Main Content Tabs -->
    <div class="premium-card">
      <div class="card-top-accent"></div>
      
      <nav mat-tab-nav-bar [tabPanel]="tabPanel" class="premium-tabs">
        <a mat-tab-link
           *ngFor="let link of navLinks"
           [routerLink]="link.path"
           routerLinkActive #rla="routerLinkActive"
           [active]="rla.isActive">
          <mat-icon style="margin-right: 8px;">{{ link.icon }}</mat-icon>
          {{ link.label }}
        </a>
      </nav>
      
      <mat-tab-nav-panel #tabPanel>
        <div style="padding: 2rem;">
          <router-outlet></router-outlet>
        </div>
      </mat-tab-nav-panel>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card indigo">
        <div class="icon-box">
          <mat-icon>security</mat-icon>
        </div>
        <div class="stat-info">
          <p class="label">Seguridad</p>
          <p class="value">Nivel: {{ roleLabel() }}</p>
        </div>
      </div>
      
      <div class="stat-card violet">
        <div class="icon-box">
          <mat-icon>settings_suggest</mat-icon>
        </div>
        <div class="stat-info">
          <p class="label">Estado</p>
          <p class="value">Sistema Operativo</p>
        </div>
      </div>

      <div class="stat-card slate">
        <div class="icon-box">
          <mat-icon>history</mat-icon>
        </div>
        <div class="stat-info">
          <p class="label">Sesión</p>
          <p class="value">Activo ahora</p>
        </div>
      </div>
    </div>
  </div>
</div>
